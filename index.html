<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Drive Direct Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-200">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Drive Link Generator</h1>
            <p class="text-sm text-gray-500 mt-1">Ubah link G-Drive biasa menjadi direct link (langsung buka foto/file)</p>
        </div>
        
        <div class="mb-5">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="driveLink">
                Paste Link Google Drive Di Sini
            </label>
            <input class="shadow-sm appearance-none border border-gray-300 rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition" id="driveLink" type="text" placeholder="https://drive.google.com/file/d/.../view">
        </div>
        
        <button onclick="generateLink()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-200 shadow-md">
            Generate Direct Link
        </button>
        
        <div id="resultContainer" class="mt-6 hidden">
            <label class="block text-gray-700 text-sm font-bold mb-2" for="directLink">
                Hasil Direct Link
            </label>
            <div class="flex">
                <input class="shadow-sm appearance-none border border-gray-300 rounded-l w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none bg-gray-50" id="directLink" type="text" readonly>
                <button onclick="copyLink()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-5 rounded-r focus:outline-none transition duration-200">
                    Copy
                </button>
            </div>
            <p id="copyMessage" class="text-green-600 text-sm mt-2 hidden text-center font-medium">✅ Link berhasil disalin!</p>
        </div>
        
        <p id="errorMessage" class="text-red-500 text-sm mt-4 hidden text-center font-medium">⚠️ Format link tidak valid. Pastikan link asli dari Google Drive.</p>
    </div>

    <script>
        function generateLink() {
            const inputLink = document.getElementById('driveLink').value.trim();
            const resultContainer = document.getElementById('resultContainer');
            const directLinkInput = document.getElementById('directLink');
            const errorMessage = document.getElementById('errorMessage');
            const copyMessage = document.getElementById('copyMessage');
            
            // Sembunyikan pesan sebelumnya
            errorMessage.classList.add('hidden');
            copyMessage.classList.add('hidden');
            resultContainer.classList.add('hidden');
            
            if (!inputLink) return;

            // Regex untuk mengekstrak ID File
            const regexId = /\/d\/([a-zA-Z0-9_-]+)/;
            const regexIdParam = /id=([a-zA-Z0-9_-]+)/;
            
            let fileId = null;
            
            if (regexId.test(inputLink)) {
                fileId = inputLink.match(regexId)[1];
            } else if (regexIdParam.test(inputLink)) {
                fileId = inputLink.match(regexIdParam)[1];
            }
            
            if (fileId) {
                const directLink = `https://drive.google.com/uc?export=view&id=${fileId}`;
                directLinkInput.value = directLink;
                resultContainer.classList.remove('hidden');
            } else {
                errorMessage.classList.remove('hidden');
            }
        }

        function copyLink() {
            const directLinkInput = document.getElementById('directLink');
            const copyMessage = document.getElementById('copyMessage');
            
            directLinkInput.select();
            directLinkInput.setSelectionRange(0, 99999); // Untuk perangkat mobile
            
            navigator.clipboard.writeText(directLinkInput.value).then(() => {
                copyMessage.classList.remove('hidden');
                setTimeout(() => {
                    copyMessage.classList.add('hidden');
                }, 2500);
            });
        }
    </script>
</body>
</html>
